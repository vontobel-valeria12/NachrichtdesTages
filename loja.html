        button {

            color: white;
            border: none;
            padding: 12px 25px;

        #carrinho {

    <script>
        let carrinho = [];
        let total = 0;

        function adicionarAoCarrinho(nome, preco) {
            carrinho.push({nome, preco});
            total += preco;
            atualizarCarrinho();
        }

        function atualizarCarrinho() {
            const lista = document.getElementById('lista-itens');
            lista.innerHTML = '';
            carrinho.forEach(item => {
                const li = document.createElement('li');
                li.textContent = `\( {item.nome} - R \) ${item.preco.toFixed(2)}`;
                lista.appendChild(li);
            });
            document.getElementById('total').textContent = `Total estimado: R$ ${total.toFixed(2)}`;
        }

        function enviarWhatsApp() {
            if (carrinho.length === 0) {
                alert('Adicione pelo menos um produto!');
                return;
            }
            let mensagem = 'Oi Valéria! Estou interessada nesses produtos:\n\n';
            carrinho.forEach(item => {
                mensagem += `• \( {item.nome} - R \) ${item.preco}\n`;
            });
            mensagem += `\nTotal estimado: R$ ${total.toFixed(2)}\n\nQuero personalizar da seguinte forma: (me conte os detalhes!)`;
            const whatsappLink = `https://wa.me/SEUNUMERO?text=${encodeURIComponent(mensagem)}`;
            window.open(whatsappLink, '_blank');
        }
    </script>
