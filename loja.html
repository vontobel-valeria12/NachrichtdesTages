     /* Grundstyling */
body {
    font-family: 'Poppins', sans-serif;
    background-color: #121212; /* Sehr dunkles Anthrazit */
    color: #e0e0e0;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 1200px;
    margin: auto;
    text-align: center;
}

h1 {
    color: #d4af37; /* Gold */
    font-size: 2.5rem;
    margin-bottom: 40px;
    text-transform: uppercase;
    letter-spacing: 3px;
}

/* Filter-Buttons Styling */
#filter-buttons {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    margin-bottom: 50px;
}

.btn {
    background: transparent;
    border: 1px solid #d4af37;
    color: #d4af37;
    padding: 10px 20px;
    cursor: pointer;
    border-radius: 30px; /* Abgerundete elegante Buttons */
    transition: all 0.3s ease;
    font-weight: 600;
}

.btn:hover, .btn.active {
    background: #d4af37;
    color: #121212;
    box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
}

/* Das Raster (Grid) - Hier passiert die Magie */
.row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px; /* Abstand zwischen den Bildern */
}

/* Jede Spalte (Column) */
.column {
    display: none; /* Wird vom JS gesteuert */
    flex: 1 1 calc(25% - 30px); /* 4 Bilder pro Zeile */
    max-width: calc(25% - 30px);
    box-sizing: border-box;
}

/* Wenn die Klasse "show" durch JS hinzugefügt wird */
.show {
    display: block;
}

/* Die Bilder selbst */
.column img {
    width: 100%;
    height: 250px; /* Feste Höhe für Symmetrie */
    object-fit: cover; /* Verhindert Verzerrung */
    border-radius: 8px;
    border: 1px solid #333;
    transition: transform 0.4s ease;
    filter: grayscale(20%); /* Leicht dezente Farben */
}

.column img:hover {
    transform: scale(1.03);
    border-color: #d4af37;
    filter: grayscale(0%);
}

/* Responsive für Tablets (2 Bilder) und Handys (1 Bild) */
@media (max-width: 900px) {
    .column {
        flex: 1 1 calc(50% - 20px);
        max-width: calc(50% - 20px);
    }
}

@media (max-width: 600px) {
    .column {
        flex: 1 1 100%;
        max-width: 100%;
    }
}
    </style>

    <script>
       filterSelection("all");

function filterSelection(c) {
    var x, i;
    x = document.getElementsByClassName("column");
    if (c == "all") c = "";
    
    for (i = 0; i < x.length; i++) {
        // Entfernt die Klasse "show", um das Element zu verstecken
        w3RemoveClass(x[i], "show");
        // Fügt die Klasse "show" hinzu, wenn die Kategorie passt
        if (x[i].className.indexOf(c) > -1) w3AddClass(x[i], "show");
    }
}

function w3AddClass(element, name) {
    var i, arr1, arr2;
    arr1 = element.className.split(" ");
    arr2 = name.split(" ");
    for (i = 0; i < arr2.length; i++) {
        if (arr1.indexOf(arr2[i]) == -1) {
            element.className += " " + arr2[i];
        }
    }
}

function w3RemoveClass(element, name) {
    var i, arr1, arr2;
    arr1 = element.className.split(" ");
    arr2 = name.split(" ");
    for (i = 0; i < arr2.length; i++) {
        while (arr1.indexOf(arr2[i]) > -1) {
            arr1.splice(arr1.indexOf(arr2[i]), 1);
        }
    }
    element.className = arr1.join(" ");
}

// Aktiven Button markieren
var btnContainer = document.getElementById("filter-buttons");
if (btnContainer) {
    var btns = btnContainer.getElementsByClassName("btn");
    for (var i = 0; i < btns.length; i++) {
        btns[i].addEventListener("click", function() {
            var current = document.getElementsByClassName("active");
            // Sicherheitscheck: Nur ersetzen, wenn ein aktiver Button existiert
            if (current.length > 0) {
                current[0].className = current[0].className.replace(" active", "");
            }
            this.className += " active";
        });
    }
}
